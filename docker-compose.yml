name: nebulon-gpt


services:
  nebulon-gpt:
    build:
      context: .
      dockerfile: Dockerfile
    image: nebulon-gpt
    container_name: nebulon-gpt
    ports:
      - "3000:80"
      - "3443:443"
    restart: unless-stopped
    networks:
      - ollama-network
    volumes:
      - chat-data:/app/data
    environment:
      - NODE_ENV=production
      # Ollama Configuration (Runtime - configures nginx proxy at container startup)
      - OLLAMA_URL=${OLLAMA_URL:-http://host.docker.internal:11434}
      # Custom header for Ollama requests (optional - uncomment and set if needed)
      # - OLLAMA_CUSTOM_HEADER_NAME=X-API-Key
      # - OLLAMA_CUSTOM_HEADER_VALUE=your-secret-key-here
      # Frontend build-time environment variables (deprecated - use OLLAMA_URL instead)
      - REACT_APP_OLLAMA_API_URL=http://host.docker.internal:11434
      - REACT_APP_VOSK_SERVER_URL=ws://localhost:3000/vosk
      - REACT_APP_TTS_SERVER_URL=ws://localhost:3000/tts
      # Python services environment variables
      - PYTHONUNBUFFERED=1
      - HF_HOME=/app/.cache/huggingface
      - TRANSFORMERS_CACHE=/app/.cache/huggingface/transformers
      - HF_DATASETS_CACHE=/app/.cache/huggingface/datasets
      - HF_HUB_OFFLINE=0
      - KOKORO_SERVER_HOST=0.0.0.0
      - KOKORO_SERVER_PORT=2701

networks:
  ollama-network:
    driver: bridge

volumes:
  chat-data:
    driver: local
