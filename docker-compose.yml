services:
  nebulon-gpt:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nebulon-gpt
    ports:
      - "3000:80"
      - "3001:3001"  # Node.js server port
    restart: unless-stopped
    networks:
      - ollama-network
    volumes:
      - ./nginx.conf:/etc/nginx/http.d/default.conf
      - chat-data:/app/nebulon-gpt-data
      - vosk-models:/app/vosk-models
    environment:
      - NODE_ENV=production
      - REACT_APP_OLLAMA_API_URL=http://host.docker.internal:11434
      - REACT_APP_VOSK_SERVER_URL=ws://vosk-server:2700
    depends_on:
      vosk-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health", "||", "exit", "1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  vosk-server:
    build:
      context: ./Vosk-Server/websocket
      dockerfile: Dockerfile
    container_name: vosk-server
    ports:
      - "2700:2700"
    restart: unless-stopped
    networks:
      - ollama-network
    volumes:
      - vosk-models:/app/models
      - ./Vosk-Server/websocket/models:/app/models-backup
    environment:
      - PYTHONUNBUFFERED=1
      - VOSK_SERVER_INTERFACE=0.0.0.0
      - VOSK_SERVER_PORT=2700
    command: python asr_server_with_models.py models
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.socket(); s.connect(('localhost', 2700)); s.close()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  ollama-network:
    driver: bridge

volumes:
  vosk-models:
    driver: local
  chat-data:
    driver: local
