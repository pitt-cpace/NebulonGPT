services:
  nebulon-gpt:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nebulon-gpt
    ports:
      - "3000:80"
    restart: unless-stopped
    networks:
      - nebulon-network
    volumes:
      - ./nginx.conf:/etc/nginx/http.d/default.conf
      - chat-data:/app/data
      - vosk-models:/app/vosk-models
    environment:
      - NODE_ENV=production
      # This is used during the build process
      - REACT_APP_OLLAMA_API_URL=http://host.docker.internal:11434
      - REACT_APP_VOSK_SERVER_URL=ws://vosk-server:2700
      - REACT_APP_TTS_SERVER_URL=ws://kokoro-tts:2701
    depends_on:
      - vosk-server
      - kokoro-tts

  vosk-server:
    build:
      context: ./Vosk-Server
      dockerfile: Dockerfile.vosk
    container_name: vosk-server
    ports:
      - "2700:2700"
    restart: unless-stopped
    networks:
      - nebulon-network
    volumes:
      - vosk-models:/app/models
      - ./Vosk-Server/websocket/models:/app/websocket/models
    environment:
      - PYTHONUNBUFFERED=1
    command: ["python", "/app/websocket/asr_server_with_models.py", "/app/models"]

  kokoro-tts:
    build:
      context: ./Kokoro-TTS-Server
      dockerfile: Dockerfile
    container_name: kokoro-tts
    ports:
      - "2701:2701"
    restart: unless-stopped
    networks:
      - nebulon-network
    volumes:
      - tts-models:/app/models
    environment:
      - PYTHONUNBUFFERED=1
      - KOKORO_SERVER_HOST=0.0.0.0
      - KOKORO_SERVER_PORT=2701

networks:
  nebulon-network:
    driver: bridge

volumes:
  chat-data:
    driver: local
  vosk-models:
    driver: local
  tts-models:
    driver: local
